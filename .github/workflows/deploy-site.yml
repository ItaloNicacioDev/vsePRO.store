name: Deploy VSE PRO Marketplace to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'content/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:  # permite disparar manualmente

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Build — gera o site estático + content.json
  # ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (para build tools opcionais)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Gera o content.json a partir dos manifests
      - name: Generate content.json
        run: |
          python3 scripts/build_content_index.py

      # Copia os arquivos do site para o diretório de build
      - name: Prepare build directory
        run: |
          mkdir -p _site
          cp site/index.html _site/index.html
          cp -r site/assets _site/assets 2>/dev/null || true
          cp content/content.json _site/content.json 2>/dev/null || true
          # Gera sitemap
          python3 scripts/generate_sitemap.py > _site/sitemap.xml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # ──────────────────────────────────────────────────
  # JOB 2: Deploy — publica no GitHub Pages
  # ──────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
