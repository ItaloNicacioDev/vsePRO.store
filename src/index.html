    /* ── Reset & Variables ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0f;
      --surface:    #16161a;
      --surface2:   #1e1e24;
      --border:     #2a2a35;
      --accent:     #6c63ff;
      --accent2:    #ff6584;
      --accent3:    #43d9ad;
      --text:       #e8e8f0;
      --muted:      #7a7a9a;
      --radius:     12px;
      --shadow:     0 4px 24px rgba(0,0,0,.5);
      --glow:       0 0 32px rgba(108,99,255,.25);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Scrollbar ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Typography ────────────────────────────────────── */
    h1, h2, h3 { line-height: 1.2; font-weight: 700; }
    h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
    h2 { font-size: clamp(1.4rem, 3vw, 2rem); }
    h3 { font-size: 1.1rem; }
    p  { color: var(--muted); }

    /* ── Layout ─────────────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ── Navbar ─────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; gap: 24px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 800; color: var(--text);
      text-decoration: none;
    }
    .logo-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: .65rem; padding: 2px 7px;
      border-radius: 99px; font-weight: 700; letter-spacing: .05em;
    }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: .9rem;
      padding: 6px 14px; border-radius: 8px; transition: all .2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--accent); background: rgba(108,99,255,.12); }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 20px; border-radius: 10px; font-size: .875rem;
      font-weight: 600; cursor: pointer; border: none;
      transition: all .2s; text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff; box-shadow: 0 4px 16px rgba(108,99,255,.35);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(108,99,255,.5); }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { background: var(--surface2); border-color: var(--accent); }
    .btn-sm { padding: 6px 14px; font-size: .8rem; }
    .btn-free {
      background: linear-gradient(135deg, var(--accent3), #20b2aa);
      color: var(--bg); font-weight: 700;
    }
    .btn-paid {
      background: linear-gradient(135deg, var(--accent2), #f97316);
      color: #fff;
    }

    /* ── Hero ───────────────────────────────────────────── */
    .hero {
      padding: 100px 0 80px;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(108,99,255,.18) 0%, transparent 70%);
      text-align: center;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(108,99,255,.12); border: 1px solid rgba(108,99,255,.3);
      color: var(--accent); font-size: .8rem; font-weight: 600;
      padding: 4px 14px; border-radius: 99px; margin-bottom: 24px;
    }
    .hero h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { max-width: 560px; margin: 20px auto 40px; font-size: 1.1rem; }
    .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-stats {
      display: flex; gap: 48px; justify-content: center; margin-top: 64px;
      padding-top: 32px; border-top: 1px solid var(--border);
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 800; color: var(--accent); display: block; }
    .stat-label { font-size: .8rem; color: var(--muted); }

    /* ── Filters ─────────────────────────────────────────── */
    .filters { padding: 40px 0 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filter-btn {
      padding: 7px 18px; border-radius: 99px; font-size: .85rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); transition: all .2s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .search-box {
      margin-left: auto; display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
    }
    .search-box input {
      background: none; border: none; outline: none; color: var(--text);
      font-size: .9rem; width: 200px;
    }
    .search-box input::placeholder { color: var(--muted); }

    /* ── Grid ───────────────────────────────────────────── */
    .section { padding: 20px 0 60px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ── Card ───────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: all .3s; cursor: pointer; position: relative;
    }
    .card:hover {
      border-color: var(--accent); transform: translateY(-4px);
      box-shadow: var(--glow);
    }
    .card-thumb {
      aspect-ratio: 16/9; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; font-size: 3rem;
    }
    .card-thumb::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.6));
    }
    .card-badge {
      position: absolute; top: 10px; right: 10px; z-index: 1;
      font-size: .7rem; font-weight: 700; padding: 3px 8px; border-radius: 99px;
    }
    .badge-free { background: var(--accent3); color: var(--bg); }
    .badge-paid { background: var(--accent2); color: #fff; }
    .badge-new  { background: var(--accent);  color: #fff; }
    .card-body { padding: 16px; }
    .card-type {
      font-size: .72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .08em; color: var(--accent); margin-bottom: 6px;
    }
    .card-title { font-weight: 700; font-size: 1rem; color: var(--text); margin-bottom: 6px; }
    .card-desc { font-size: .82rem; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .card-price { font-weight: 700; }
    .card-price.free { color: var(--accent3); }
    .card-price.paid { color: var(--accent2); }
    .card-meta { font-size: .75rem; color: var(--muted); }
    .card-actions { display: flex; gap: 8px; }

    /* ── Thumb Visuals ───────────────────────────────────── */
    .thumb-effect { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
    .thumb-text   { background: linear-gradient(135deg, #1a1a2e, #2d1b69); }
    .thumb-audio  { background: linear-gradient(135deg, #0d1b2a, #1b4332); }
    .thumb-lut    { background: linear-gradient(135deg, #2d1b0e, #4a1942); }
    .thumb-transition { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }

    .waveform {
      display: flex; align-items: center; gap: 3px; height: 60px;
    }
    .wave-bar {
      width: 4px; border-radius: 2px;
      background: linear-gradient(to top, var(--accent3), rgba(67,217,173,.3));
      animation: wave 1.2s ease-in-out infinite;
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50%       { transform: scaleY(1.8); }
    }

    /* ── Preview Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; width: 100%; max-width: 680px;
      box-shadow: var(--shadow); animation: slideUp .3s ease;
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px; border-bottom: 1px solid var(--border);
    }
    .modal-body { padding: 24px; }
    .modal-footer {
      display: flex; gap: 12px; justify-content: flex-end;
      padding: 20px 24px; border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .preview-thumb {
      aspect-ratio: 16/9; border-radius: 10px; overflow: hidden;
      margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 6rem; background: var(--surface2);
    }
    .detail-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .detail-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; font-size: .78rem; color: var(--muted);
    }
    .close-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 1.4rem; padding: 4px; line-height: 1;
      transition: color .2s;
    }
    .close-btn:hover { color: var(--text); }

    /* ── Download notification ───────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 2000;
      background: var(--surface2); border: 1px solid var(--accent3);
      border-radius: 12px; padding: 16px 20px; min-width: 300px;
      animation: slideUp .3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .toast-title { font-weight: 700; color: var(--accent3); margin-bottom: 4px; }
    .toast-sub   { font-size: .82rem; color: var(--muted); }
    .toast-code  {
      margin-top: 10px; background: var(--bg); border-radius: 6px;
      padding: 8px 12px; font-family: monospace; font-size: .78rem;
      color: var(--accent); border: 1px solid var(--border);
    }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border); padding: 48px 0;
      text-align: center; color: var(--muted); font-size: .85rem;
    }
    .footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 16px; }
    .footer-links a { color: var(--muted); text-decoration: none; }
    .footer-links a:hover { color: var(--text); }

    /* ── Addon CTA ───────────────────────────────────────── */
    .cta-section {
      background: linear-gradient(135deg, rgba(108,99,255,.15), rgba(255,101,132,.1));
      border: 1px solid rgba(108,99,255,.3); border-radius: 20px;
      padding: 48px; text-align: center; margin: 40px 0;
    }
    .cta-section h2 { margin-bottom: 12px; }
    .cta-section p  { margin-bottom: 28px; }
    .cta-actions    { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .code-snippet {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 16px; font-family: monospace; font-size: .82rem;
      color: var(--accent3); display: inline-block; margin-top: 16px;
    }

    /* ── Pro badge ───────────────────────────────────────── */
    .pro-gate {
      text-align: center; padding: 24px;
      background: linear-gradient(135deg, rgba(255,101,132,.1), rgba(249,115,22,.08));
      border: 1px solid rgba(255,101,132,.25); border-radius: 12px;
      margin-top: 8px;
    }
    .pro-gate h3 { color: var(--accent2); margin-bottom: 8px; }

    /* ── Tag chips ──────────────────────────────────────── */
    .tag { background: rgba(108,99,255,.12); border: 1px solid rgba(108,99,255,.25); color: var(--accent); border-radius: 6px; padding: 2px 8px; font-size: .72rem; font-weight: 600; }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 640px) {
      .hero { padding: 60px 0 40px; }
      .hero-stats { gap: 24px; flex-wrap: wrap; }
      .nav-links { display: none; }
      .search-box { display: none; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

        type: "transition",

        description: "16 transições suaves: dissolve, push, slide, wipe com timing ajustável via keyframes.",
        emoji: "✨",
        thumbClass: "thumb-transition",
        tags: ["transição", "dissolve", "slide", "wipe"],
        tier: "free",
        price: null,
        downloads: 3100,
        version: "1.2",
        blenderMin: "4.0",
        fileSize: "28 KB",
        downloadUrl: "https://github.com/seu-usuario/vsepro/releases/download/v1.0.0/tr-smooth.vsepro",
        isNew: false,
      },
      {
        id: "tr-dynamic-pack",
        type: "transition",
        title: "Dynamic Motion Transitions",
        description: "24 transições dinâmicas com motion blur: zoom, spin, whip pan, light leak e film burn.",
        emoji: "🌀",
        thumbClass: "thumb-transition",
        tags: ["transição", "zoom", "spin", "light leak"],
        tier: "paid",
        price: "R$ 45",
        priceUSD: "$8.99",
        downloads: 267,
        version: "1.0",
        blenderMin: "4.0",
        fileSize: "1.1 MB",
        gumroadUrl: "https://gumroad.com/l/vsepro-dynamic-transitions",
        isNew: true,
      },
    ];

    const TYPE_LABELS = {
      all:        "Todos",
      effect:     "Efeitos",
      text:       "Textos",
      sound:      "Áudio & SFX",
      lut:        "LUTs",
      transition: "Transições",
    };

    const TYPE_ICONS = {
      effect: "⚡",  text: "📝",  sound: "🔊",
      lut: "🎨",     transition: "✨",  all: "🗂️",
    };

    /* ── WAVEFORM SVG ───────────────────────────────────── */
    function Waveform() {
      const bars = Array.from({ length: 20 }, (_, i) => ({
        height: 20 + Math.random() * 60,
        delay: `${(i * 0.06).toFixed(2)}s`,
      }));
      return (
        <div style={{ display:'flex', alignItems:'center', gap:3, height:70 }}>
          {bars.map((b, i) => (
            <div key={i} style={{
              width: 5, height: b.height, borderRadius: 3, background:
                'linear-gradient(to top, #43d9ad, rgba(67,217,173,.25))',
              animation: `wave 1.2s ease-in-out ${b.delay} infinite`,
            }} />
          ))}
        </div>
      );
    }

    /* ── CARD THUMBNAIL ─────────────────────────────────── */
    function CardThumb({ item }) {
      const common = {
        width:'100%', height:'100%',
        display:'flex', alignItems:'center', justifyContent:'center',
        position:'relative',
      };
      if (item.type === 'sound') {
        return (
          <div style={{ ...common, background:'linear-gradient(135deg,#0d1b2a,#1b4332)', padding:'0 20px' }}>
            <Waveform />
          </div>
        );
      }
      if (item.type === 'effect') {
        return (
          <div style={{ ...common, background:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)' }}>
            <div style={{ fontSize:'3.5rem', filter:'drop-shadow(0 0 20px rgba(108,99,255,.8))' }}>
              {item.emoji}
            </div>
          </div>
        );
      }
      if (item.type === 'lut') {
        return (
          <div style={{ ...common, overflow:'hidden' }}>
            <div style={{ position:'absolute', inset:0, display:'flex' }}>
              {['#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'].map((c, i) => (
                <div key={i} style={{ flex:1, background:c, opacity:.85 }} />
              ))}
            </div>
            <div style={{ position:'relative', fontSize:'2.5rem', zIndex:1, filter:'drop-shadow(0 2px 8px rgba(0,0,0,.8))' }}>
              {item.emoji}
            </div>
          </div>
        );
      }
      if (item.type === 'transition') {
        return (
          <div style={{ ...common, background:'linear-gradient(135deg,#0f2027,#203a43,#2c5364)', overflow:'hidden' }}>
            <div style={{
              position:'absolute', left:'40%', top:0, bottom:0, width:3,
              background:'linear-gradient(to bottom, transparent, #6c63ff, transparent)',
              boxShadow:'0 0 20px #6c63ff',
            }} />
            <div style={{ fontSize:'2.5rem', position:'relative' }}>{item.emoji}</div>
          </div>
        );
      }
      return (
        <div style={{ ...common, background:'linear-gradient(135deg,#1a1a2e,#2d1b69)' }}>
          <div style={{ fontSize:'3.5rem' }}>{item.emoji}</div>
        </div>
      );
    }

    /* ── CARD COMPONENT ─────────────────────────────────── */
    function Card({ item, onOpen }) {
      return (
        <div className="card" onClick={() => onOpen(item)}>
          <div className="card-thumb">
            <CardThumb item={item} />
            <span className={`card-badge badge-${item.tier}`}>
              {item.tier === 'free' ? 'GRÁTIS' : item.price}
            </span>
            {item.isNew && (
              <span className="card-badge badge-new" style={{ top:10, left:10, right:'auto' }}>
                NOVO
              </span>
            )}
          </div>
          <div className="card-body">
            <div className="card-type">{TYPE_ICONS[item.type]} {TYPE_LABELS[item.type]}</div>
            <div className="card-title">{item.title}</div>
            <div className="card-desc">{item.description}</div>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:14 }}>
              {item.tags.slice(0,3).map(t => <span key={t} className="tag">{t}</span>)}
            </div>
            <div className="card-footer">
              <span className={`card-price ${item.tier}`}>
                {item.tier === 'free' ? '✓ Grátis' : item.price}
              </span>
              <span className="card-meta">↓ {item.downloads.toLocaleString()}</span>
            </div>
          </div>
        </div>
      );
    }

    /* ── MODAL COMPONENT ─────────────────────────────────── */
    function Modal({ item, onClose }) {
      const [downloaded, setDownloaded] = useState(false);

      const handleDownload = useCallback(() => {
        if (item.tier === 'paid') {
          window.open(item.gumroadUrl, '_blank');
          return;
        }
        // Free: dispara download direto
        const a = document.createElement('a');
        a.href = item.downloadUrl;
        a.download = `${item.id}.vsepro`;
        a.click();
        setDownloaded(true);
      }, [item]);

      const copyBlenderCommand = useCallback(() => {
        const cmd = `vsepro.install_content("${item.id}")`;
        navigator.clipboard?.writeText(cmd);
      }, [item]);

      useEffect(() => {
        const onKey = (e) => e.key === 'Escape' && onClose();
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [onClose]);

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-header">
              <div>
                <div className="card-type">{TYPE_ICONS[item.type]} {TYPE_LABELS[item.type]}</div>
                <h2 style={{ color:'var(--text)', marginTop:4 }}>{item.title}</h2>
              </div>
              <button className="close-btn" onClick={onClose}>×</button>
            </div>

            <div className="modal-body">
              <div className="preview-thumb" style={{ background: item.type === 'sound'
                ? 'linear-gradient(135deg,#0d1b2a,#1b4332)' : 'linear-gradient(135deg,#1a1a2e,#0f3460)' }}>
                {item.type === 'sound' ? <Waveform /> : <span style={{ fontSize:'5rem' }}>{item.emoji}</span>}
              </div>

              <div className="detail-row">
                <span className="detail-chip">📦 {item.fileSize}</span>
                <span className="detail-chip">🔧 Blender {item.blenderMin}+</span>
                <span className="detail-chip">🏷️ v{item.version}</span>
                <span className="detail-chip">↓ {item.downloads.toLocaleString()} downloads</span>
              </div>

              <p style={{ marginBottom:16, color:'var(--text)', opacity:.85 }}>{item.description}</p>

              <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:20 }}>
                {item.tags.map(t => <span key={t} className="tag">{t}</span>)}
              </div>

              {item.tier === 'free' ? (
                <div style={{ background:'rgba(67,217,173,.08)', border:'1px solid rgba(67,217,173,.25)', borderRadius:10, padding:16 }}>
                  <div style={{ color:'var(--accent3)', fontWeight:700, marginBottom:8 }}>
                    🎁 Conteúdo Gratuito
                  </div>
                  <p style={{ fontSize:'.85rem', color:'var(--muted)', marginBottom:12 }}>
                    Instale direto no Blender via VSE PRO, ou baixe o arquivo .vsepro manualmente.
                  </p>
                  <div className="code-snippet">
                    vsepro.install_content("{item.id}")
                  </div>
                  <p style={{ fontSize:'.75rem', color:'var(--muted)', marginTop:8 }}>
                    Cole no Script Editor do Blender, ou use o painel VSE PRO → Marketplace
                  </p>
                </div>
              ) : (
                <div className="pro-gate">
                  <h3>🔒 Conteúdo Premium</h3>
                  <p style={{ margin:'8px 0 16px', fontSize:'.88rem' }}>
                    Adquira no Gumroad. Após a compra, você receberá uma licença para ativar
                    diretamente no VSE PRO Marketplace.
                  </p>
                  <div style={{ fontSize:'2rem', fontWeight:800, color:'var(--accent2)', marginBottom:16 }}>
                    {item.price} <span style={{ fontSize:'1rem', color:'var(--muted)' }}>({item.priceUSD})</span>
                  </div>
                </div>
              )}
            </div>

            <div className="modal-footer">
              <button className="btn btn-outline" onClick={onClose}>Fechar</button>
              {item.tier === 'free' ? (
                <>
                  <button className="btn btn-outline btn-sm" onClick={copyBlenderCommand}>
                    📋 Copiar Comando
                  </button>
                  <button className="btn btn-free" onClick={handleDownload}>
                    {downloaded ? '✓ Baixado!' : '⬇ Baixar .vsepro'}
                  </button>
                </>
              ) : (
                <button className="btn btn-paid" onClick={handleDownload}>
                  🛒 Comprar no Gumroad — {item.price}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── TOAST ───────────────────────────────────────────── */
    function Toast({ item, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 6000);
        return () => clearTimeout(t);
      }, []);

      return (
        <div className="toast">
          <div className="toast-title">✅ {item.title} instalado!</div>
          <div className="toast-sub">Disponível no painel VSE PRO → Marketplace</div>
          <div className="toast-code">vsepro.install_content("{item.id}")</div>
        </div>
      );
    }

    /* ── MAIN APP ─────────────────────────────────────────── */
    function App() {
      const [filter, setFilter]   = useState('all');
      const [tier,   setTier]     = useState('all');
      const [search, setSearch]   = useState('');
      const [modal,  setModal]    = useState(null);
      const [toast,  setToast]    = useState(null);

      const filtered = useMemo(() => CONTENT.filter(item => {
        if (filter !== 'all' && item.type !== filter) return false;
        if (tier === 'free' && item.tier !== 'free') return false;
        if (tier === 'paid' && item.tier !== 'paid') return false;
        if (search) {
          const q = search.toLowerCase();
          return item.title.toLowerCase().includes(q) ||
                 item.description.toLowerCase().includes(q) ||
                 item.tags.some(t => t.includes(q));
        }
        return true;
      }), [filter, tier, search]);

      const totalFree = CONTENT.filter(c => c.tier === 'free').length;
      const totalPaid = CONTENT.filter(c => c.tier === 'paid').length;
      const totalDL   = CONTENT.reduce((s, c) => s + c.downloads, 0);

      return (
        <>
          {/* ── Navbar ─────────────────────────────────── */}
          <nav>
            <div className="container">
              <div className="nav-inner">
                <a href="#" className="logo">
                  <span>🎬</span>
                  <span>VSE PRO</span>
                  <span className="logo-badge">MARKETPLACE</span>
                </a>
                <div className="nav-links">
                  <a href="#content" className="active">Explorar</a>
                  <a href="#docs">Documentação</a>
                  <a href="https://github.com/seu-usuario/vsepro" target="_blank">GitHub</a>
                  <a href="https://gumroad.com/l/vsepro" target="_blank">Adquirir Addon</a>
                </div>
                <a href="https://gumroad.com/l/vsepro" target="_blank" className="btn btn-primary">
                  Obter VSE PRO →
                </a>
              </div>
            </div>
          </nav>

          {/* ── Hero ───────────────────────────────────── */}
          <section className="hero">
            <div className="container">
              <div className="hero-eyebrow">
                <span>🔌</span> Plugin profissional para Blender VSE
              </div>
              <h1>
                Eleve suas edições com<br />
                <span>efeitos, sons e textos</span>
              </h1>
              <p>
                Templates prontos para VSE PRO — instale com um clique diretamente
                no Blender, sem sair do fluxo de edição.
              </p>
              <div className="hero-actions">
                <a href="#content" className="btn btn-primary">Explorar Templates</a>
                <a href="https://github.com/seu-usuario/vsepro" target="_blank" className="btn btn-outline">
                  Ver no GitHub
                </a>
              </div>
              <div className="hero-stats">
                <div className="stat-item">
                  <span className="stat-num">{totalFree}</span>
                  <span className="stat-label">Grátis</span>
                </div>
                <div className="stat-item">
                  <span className="stat-num">{totalPaid}</span>
                  <span className="stat-label">Premium</span>
                </div>
                <div className="stat-item">
                  <span className="stat-num">{(totalDL/1000).toFixed(1)}k</span>
                  <span className="stat-label">Downloads</span>
                </div>
                <div className="stat-item">
                  <span className="stat-num">4.0+</span>
                  <span className="stat-label">Blender</span>
                </div>
              </div>
            </div>
          </section>

          {/* ── Content Section ────────────────────────── */}
          <section className="section" id="content">
            <div className="container">

              {/* Filters */}
              <div className="filters">
                {Object.entries(TYPE_LABELS).map(([key, label]) => (
                  <button key={key}
                    className={`filter-btn ${filter === key ? 'active' : ''}`}
                    onClick={() => setFilter(key)}>
                    {TYPE_ICONS[key] || '🗂️'} {label}
                  </button>
                ))}
                <button
                  className={`filter-btn ${tier === 'free' ? 'active' : ''}`}
                  style={tier === 'free' ? { background:'var(--accent3)', color:'var(--bg)', borderColor:'var(--accent3)' } : {}}
                  onClick={() => setTier(t => t === 'free' ? 'all' : 'free')}>
                  🎁 Grátis
                </button>
                <div className="search-box">
                  <span style={{ color:'var(--muted)' }}>🔍</span>
                  <input
                    placeholder="Buscar templates…"
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                  />
                </div>
              </div>

              {/* Grid */}
              <div className="section-header">
                <h2>{filtered.length} template{filtered.length !== 1 ? 's' : ''}</h2>
                <span style={{ color:'var(--muted)', fontSize:'.85rem' }}>
                  Clique para ver detalhes e instalar
                </span>
              </div>

              {filtered.length === 0 ? (
                <div style={{ textAlign:'center', padding:'60px 0', color:'var(--muted)' }}>
                  <div style={{ fontSize:'3rem', marginBottom:16 }}>🔍</div>
                  <p>Nenhum template encontrado para "<strong>{search}</strong>"</p>
                </div>
              ) : (
                <div className="grid">
                  {filtered.map(item => (
                    <Card key={item.id} item={item} onOpen={setModal} />
                  ))}
                </div>
              )}
            </div>
          </section>

          {/* ── Addon CTA ──────────────────────────────── */}
          <section id="docs">
            <div className="container">
              <div className="cta-section">
                <h2>🔌 Instalação Direta no Blender</h2>
                <p>
                  Com o VSE PRO instalado, acesse o Marketplace sem sair do Blender.
                  Baixe, instale e aplique em segundos.
                </p>
                <div className="cta-actions">
                  <a href="https://gumroad.com/l/vsepro" target="_blank" className="btn btn-primary">
                    Adquirir VSE PRO
                  </a>
                  <a href="https://github.com/seu-usuario/vsepro/releases" target="_blank" className="btn btn-outline">
                    GitHub Releases
                  </a>
                </div>
                <div>
                  <div className="code-snippet">
                    Edit → Preferences → Add-ons → Install → vsepro_v1.2.0.zip
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* ── Footer ─────────────────────────────────── */}
          <footer>
            <div className="container">
              <div className="footer-links">
                <a href="https://github.com/seu-usuario/vsepro">GitHub</a>
                <a href="https://gumroad.com/l/vsepro">Gumroad</a>
                <a href="mailto:contato@vsepro.dev">Contato</a>
                <a href="#">Política de uso</a>
              </div>
              <p>© 2025 VSE PRO. Feito com 🎬 para a comunidade Blender.</p>
            </div>
          </footer>

          {/* ── Modal ──────────────────────────────────── */}
          {modal && <Modal item={modal} onClose={() => setModal(null)} />}

          {/* ── Toast ──────────────────────────────────── */}
          {toast && <Toast item={toast} onClose={() => setToast(null)} />}

          {/* ── Wave animation ─────────────────────────── */}
          <style>{`
            @keyframes wave {
              0%, 100% { transform: scaleY(1); }
              50% { transform: scaleY(1.8); }
            }
          `}</style>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
